# render.yaml — Deploy backend to Render.com (free tier)
services:
  - type: web
    name: tasktracker-backend
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false   # Set this in Render dashboard
      - key: FRONTEND_URL
        sync: false   # Set to your Vercel frontend URL
